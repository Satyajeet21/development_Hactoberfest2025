<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hacktoberfest Contribution Tracker</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            color: #333;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
        }

        header h1 {
            font-size: 3em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        header p {
            font-size: 1.2em;
            opacity: 0.9;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            transition: transform 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-5px);
        }

        .stat-card h3 {
            color: #667eea;
            font-size: 0.9em;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
        }

        .stat-value {
            font-size: 2.5em;
            font-weight: bold;
        }

        .main-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
        }

        .card {
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .card h2 {
            color: #667eea;
            margin-bottom: 20px;
            font-size: 1.8em;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #555;
        }

        input, select, textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1em;
            transition: border-color 0.3s ease;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 8px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s ease;
            width: 100%;
        }

        .btn:hover {
            transform: translateY(-2px);
        }

        .contribution-item {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 15px;
            border-left: 4px solid #667eea;
        }

        .contribution-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .contribution-title {
            font-weight: 600;
            font-size: 1.1em;
        }

        .contribution-type {
            background: #667eea;
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.85em;
        }

        .contribution-details {
            color: #666;
            font-size: 0.9em;
            margin-bottom: 5px;
        }

        .contribution-date {
            color: #999;
            font-size: 0.85em;
        }

        .delete-btn {
            background: #ff4757;
            padding: 6px 15px;
            font-size: 0.85em;
            width: auto;
            margin-top: 10px;
            border: none;
            border-radius: 8px;
            color: white;
            cursor: pointer;
            font-weight: 600;
        }

        .progress-bar {
            background: #e0e0e0;
            border-radius: 10px;
            height: 30px;
            overflow: hidden;
            margin-top: 15px;
        }

        .progress-fill {
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            height: 100%;
            transition: width 0.5s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
            min-width: 50px;
        }

        .empty-state {
            text-align: center;
            color: #999;
            padding: 40px 20px;
        }

        .empty-state svg {
            width: 80px;
            height: 80px;
            margin-bottom: 15px;
            opacity: 0.3;
        }

        @media (max-width: 768px) {
            .main-content {
                grid-template-columns: 1fr;
            }
            header h1 {
                font-size: 2em;
            }
            .stat-value {
                font-size: 2em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🎃 Hacktoberfest Tracker</h1>
            <p>Track your open source contributions and reach your goals!</p>
        </header>

        <div class="stats-grid">
            <div class="stat-card">
                <h3>Total Contributions</h3>
                <div class="stat-value" id="totalContributions">0</div>
            </div>
            <div class="stat-card">
                <h3>Pull Requests</h3>
                <div class="stat-value" id="totalPRs">0</div>
            </div>
            <div class="stat-card">
                <h3>Issues</h3>
                <div class="stat-value" id="totalIssues">0</div>
            </div>
            <div class="stat-card">
                <h3>Goal Progress</h3>
                <div class="stat-value" id="goalProgress">0%</div>
            </div>
        </div>

        <div class="main-content">
            <div class="card">
                <h2>Add Contribution</h2>
                <div class="form-group">
                    <label for="title">Title</label>
                    <input type="text" id="title" placeholder="e.g., Fixed bug in login component">
                </div>
                <div class="form-group">
                    <label for="repo">Repository</label>
                    <input type="text" id="repo" placeholder="e.g., username/repo-name">
                </div>
                <div class="form-group">
                    <label for="type">Type</label>
                    <select id="type">
                        <option value="PR">Pull Request</option>
                        <option value="Issue">Issue</option>
                        <option value="Review">Code Review</option>
                        <option value="Documentation">Documentation</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="description">Description (Optional)</label>
                    <textarea id="description" rows="3" placeholder="Brief description of your contribution"></textarea>
                </div>
                <button class="btn" onclick="addContribution()">Add Contribution</button>

                <div class="form-group" style="margin-top: 30px;">
                    <label for="goal">Set Your Goal</label>
                    <input type="number" id="goal" placeholder="e.g., 4" min="1" value="4">
                    <button class="btn" onclick="updateGoal()" style="margin-top: 10px;">Update Goal</button>
                </div>

                <div class="progress-bar">
                    <div class="progress-fill" id="progressBar">0 / 4</div>
                </div>
            </div>

            <div class="card">
                <h2>Your Contributions</h2>
                <div id="contributionsList">
                    <div class="empty-state">
                        <svg fill="currentColor" viewBox="0 0 20 20">
                            <path d="M9 2a1 1 0 000 2h2a1 1 0 100-2H9z"></path>
                            <path fill-rule="evenodd" d="M4 5a2 2 0 012-2 3 3 0 003 3h2a3 3 0 003-3 2 2 0 012 2v11a2 2 0 01-2 2H6a2 2 0 01-2-2V5zm3 4a1 1 0 000 2h.01a1 1 0 100-2H7zm3 0a1 1 0 000 2h3a1 1 0 100-2h-3zm-3 4a1 1 0 100 2h.01a1 1 0 100-2H7zm3 0a1 1 0 100 2h3a1 1 0 100-2h-3z" clip-rule="evenodd"></path>
                        </svg>
                        <p>No contributions yet. Start adding your contributions!</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        var contributions = [];
        var currentGoal = 4;

        function addContribution() {
            var titleInput = document.getElementById('title');
            var repoInput = document.getElementById('repo');
            var typeInput = document.getElementById('type');
            var descInput = document.getElementById('description');
            
            var title = titleInput.value.trim();
            var repo = repoInput.value.trim();
            
            if (!title || !repo) {
                alert('Please fill in Title and Repository fields!');
                return;
            }
            
            var contribution = {
                id: Date.now(),
                title: title,
                repo: repo,
                type: typeInput.value,
                description: descInput.value.trim(),
                date: new Date().toLocaleDateString()
            };
            
            contributions.push(contribution);
            
            titleInput.value = '';
            repoInput.value = '';
            descInput.value = '';
            typeInput.selectedIndex = 0;
            
            updateDisplay();
        }

        function updateGoal() {
            var goalInput = document.getElementById('goal');
            var newGoal = parseInt(goalInput.value);
            
            if (newGoal && newGoal > 0) {
                currentGoal = newGoal;
                updateDisplay();
                alert('Goal updated to ' + newGoal + '!');
            } else {
                alert('Please enter a valid goal number!');
            }
        }

        function deleteContribution(id) {
            var newContributions = [];
            for (var i = 0; i < contributions.length; i++) {
                if (contributions[i].id !== id) {
                    newContributions.push(contributions[i]);
                }
            }
            contributions = newContributions;
            updateDisplay();
        }

        function updateDisplay() {
            var total = contributions.length;
            var prs = 0;
            var issues = 0;
            
            for (var i = 0; i < contributions.length; i++) {
                if (contributions[i].type === 'PR') {
                    prs++;
                }
                if (contributions[i].type === 'Issue') {
                    issues++;
                }
            }
            
            document.getElementById('totalContributions').textContent = total;
            document.getElementById('totalPRs').textContent = prs;
            document.getElementById('totalIssues').textContent = issues;
            
            var percentage = Math.min((total / currentGoal) * 100, 100);
            document.getElementById('goalProgress').textContent = Math.round(percentage) + '%';
            
            var progressBar = document.getElementById('progressBar');
            progressBar.style.width = percentage + '%';
            progressBar.textContent = total + ' / ' + currentGoal;
            
            var listDiv = document.getElementById('contributionsList');
            
            if (contributions.length === 0) {
                listDiv.innerHTML = '<div class="empty-state"><svg fill="currentColor" viewBox="0 0 20 20"><path d="M9 2a1 1 0 000 2h2a1 1 0 100-2H9z"></path><path fill-rule="evenodd" d="M4 5a2 2 0 012-2 3 3 0 003 3h2a3 3 0 003-3 2 2 0 012 2v11a2 2 0 01-2 2H6a2 2 0 01-2-2V5zm3 4a1 1 0 000 2h.01a1 1 0 100-2H7zm3 0a1 1 0 000 2h3a1 1 0 100-2h-3zm-3 4a1 1 0 100 2h.01a1 1 0 100-2H7zm3 0a1 1 0 100 2h3a1 1 0 100-2h-3z" clip-rule="evenodd"></path></svg><p>No contributions yet. Start adding your contributions!</p></div>';
            } else {
                var html = '';
                for (var i = 0; i < contributions.length; i++) {
                    var c = contributions[i];
                    html += '<div class="contribution-item">';
                    html += '<div class="contribution-header">';
                    html += '<span class="contribution-title">' + c.title + '</span>';
                    html += '<span class="contribution-type">' + c.type + '</span>';
                    html += '</div>';
                    html += '<div class="contribution-details">📦 ' + c.repo + '</div>';
                    if (c.description) {
                        html += '<div class="contribution-details">' + c.description + '</div>';
                    }
                    html += '<div class="contribution-date">📅 ' + c.date + '</div>';
                    html += '<button class="delete-btn" onclick="deleteContribution(' + c.id + ')">Delete</button>';
                    html += '</div>';
                }
                listDiv.innerHTML = html;
            }
        }
        
        updateDisplay();
    </script>
</body>
</html>
